monitor.alsa.rules = [
  # Desktop

  # Sennheiser Profile
  {
    matches = [
      { node.name = "alsa_input.usb-Sennheiser_Sennheiser_Profile_0023001053-00.mono-fallback" }
    ]
    actions = {
      update-props = {
        priority.session = 2200
      }
    }
  }

  # Headphone Jack (Back)
  {
    matches = [
      { node.name = "alsa_output.usb-Generic_USB_Audio-00.HiFi__Speaker__sink" }
    ]
    actions = {
      update-props = {
        priority.session = 800
      }
    }
  }

  # Laptop
  
  # Internal Microphone (Built-in)
  {
    matches = [
      { node.name = "alsa_input.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.HiFi__Mic1__source" }
    ]
    actions = {
      update-props = {
        priority.session = 2200
      }
    }
  }

  # Headphone Jack (Built-in)
  {
    matches = [
      { node.name = "alsa_output.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.HiFi__Headphones__sink" }
    ]
    actions = {
      update-props = {
        priority.session = 800
      }
    }
  }

  {
    matches = [
      { node.name = "alsa_input.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.HiFi__Mic2__source" }
    ]
    actions = {
      update-props = {
        priority.session = 1800
      }
    }
  }
]

monitor.bluez.rules = [
  # Bluetooth Output
  {
    matches = [
      { node.name = "~bluez_output\\..*" }
    ]
    actions = {
      update-props = {
        priority.session = 1200
      }
    }
  }

  # Bluetooth Input
  {
    matches = [
      { node.name = "~bluez_input\\..*" }
    ]
    actions = {
      update-props = {
        priority.session = 1400
      }
    }
  }
]