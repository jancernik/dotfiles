unbind C-b
set -g prefix C-s
bind C-s send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# Defaults

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g mouse on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on
set -g set-clipboard on
set -g extended-keys on

setw -g mode-keys vi

# Windows

bind c new-window -c "#{pane_current_path}"
bind t new-window -c "#{pane_current_path}"
bind , command-prompt -I "#W" "rename-window '%%'"
bind w if-shell -F "#{&&:#{==:#{window_panes},1},#{||:#{==:#{pane_current_command},zsh},#{||:#{==:#{pane_current_command},bash},#{||:#{==:#{pane_current_command},fish},#{==:#{pane_current_command},sh}}}}}" "kill-window" "command-prompt -I 'y' -p 'Kill window #W? (y/n)' \"if-shell -F '#{||:#{==:%%,y},#{==:%%,Y}}' 'kill-window'\""
bind Tab choose-tree -Zw

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Panes
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R
bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Down resize-pane -D 5
bind -n M-S-Up resize-pane -U 5
bind -n M-S-Right resize-pane -R 5

bind z resize-pane -Z
bind x if-shell -F "#{||:#{==:#{pane_current_command},zsh},#{||:#{==:#{pane_current_command},bash},#{||:#{==:#{pane_current_command},fish},#{==:#{pane_current_command},sh}}}}" "kill-pane" "command-prompt -I 'y' -p 'Kill pane? (y/n)' \"if-shell -F '#{||:#{==:%%,y},#{==:%%,Y}}' 'kill-pane'\""
bind Space next-layout

# Copy mode

bind [ copy-mode
bind s copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send -X cancel

unbind-key -T root WheelUpPane
unbind-key -T root WheelDownPane
bind-key -T root WheelUpPane send-keys -M
bind-key -T root WheelDownPane send-keys -M
bind-key -T copy-mode-vi WheelUpPane send-keys -X -N 5 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 5 scroll-down

# Status

set -g status on
set -g status-interval 2
set -g status-position bottom
set -g status-justify right
set -g status-style "bg=#1e1e2e,fg=#cccccc"

set -g status-left-length 20
set -g status-left "#{?client_prefix,#[bg=#BABBF1 fg=#1e1e2e bold] #S #[default],#[bg=#80A1EF fg=#1e1e2e bold] #S #[default]}"

set -g window-status-separator ""
set -g window-status-format "#[fg=#1e1e2e,bg=#303040] #[fg=#cccccc,bg=#303040]#I:#W "
set -g window-status-current-format "#[fg=#1e1e2e,bg=#80A1EF] #[fg=#1e1e2e,bg=#80A1EF,bold]#I:#W "

set -g status-right-length 80
set -g status-right ""

set -g message-style "bg=#303040,fg=#BABBF1"
set -g message-command-style "bg=#303040,fg=#BABBF1"
set -g pane-border-style "fg=#303040"
set -g pane-active-border-style "fg=#80A1EF"
